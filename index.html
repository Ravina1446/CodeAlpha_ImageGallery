<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">Lumina <span>Gallery</span></div>
    <div class="header-count" id="countLabel">15 works</div>
  </header>

  <!-- ── HERO ── -->
  <section class="hero">
    <h1>Light, form,<br><em>and stillness.</em></h1>
    <p>A curated collection of photography exploring texture, architecture, nature, and the quiet geometry of everyday things.</p>
  </section>

  <!-- ── FILTER BAR ── -->
  <div class="filter-bar">
    <span class="filter-label">Browse</span>
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="nature">Nature</button>
    <button class="filter-btn" data-cat="architecture">Architecture</button>
    <button class="filter-btn" data-cat="portrait">Portrait</button>
    <button class="filter-btn" data-cat="abstract">Abstract</button>
  </div>
  <hr class="divider">

  <!-- ── GALLERY ── -->
  <main class="gallery-wrap">
    <div class="gallery-grid" id="gallery"></div>
  </main>

  <!-- ── LIGHTBOX ── -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lb-inner">

      <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
      <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">&#8592;</button>
      <button class="lb-nav lb-next" id="lbNext" aria-label="Next">&#8594;</button>

      <div class="lb-img-wrap">
        <img id="lbImg" src="" alt="">
        <div class="lb-filter-layer" id="lbFilterLayer"></div>
      </div>

      <div class="lb-caption">
        <div class="lb-text">
          <div class="lb-title" id="lbTitle"></div>
          <div class="lb-meta"  id="lbMeta"></div>
        </div>
        <div class="lb-counter" id="lbCounter"></div>
      </div>

      <div class="lb-filters">
        <span class="lb-filter-label">Filter</span>
        <button class="lb-filter-btn active" data-filter="none">Original</button>
        <button class="lb-filter-btn" data-filter="grayscale(100%)">B&amp;W</button>
        <button class="lb-filter-btn" data-filter="sepia(80%)">Sepia</button>
        <button class="lb-filter-btn" data-filter="contrast(130%) saturate(140%)">Vivid</button>
        <button class="lb-filter-btn" data-filter="brightness(1.1) contrast(0.9) saturate(0.7)">Fade</button>
        <button class="lb-filter-btn" data-filter="hue-rotate(30deg) saturate(120%)">Shift</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
